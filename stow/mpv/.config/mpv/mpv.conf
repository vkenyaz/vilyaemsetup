ytdl-format=bestvideo[height<=480]+bestaudio/best
audio-display=no
script-opts=visualizer=1
sub-font="Times New Roman"
sub-font-size=38
sub-color="#B4DAF2"
sub-border-color="#000000"
sub-shadow-color="#000000"
sub-shadow-offset=2
sub-visibility=yes
sub-margin-y=60
hwdec=auto-safe
vo=gpu
save-position-on-quit=yes
